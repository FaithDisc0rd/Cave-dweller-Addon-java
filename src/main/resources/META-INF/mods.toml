modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Cadentem"
description='''Expansion for cave_dweller: apparitions and additional AI behavior modes.'''
# Entry point: @Mod on de.cadentem.cave_dweller_addon.CaveDwellerAddon

[[mixins]]
config="cave_dweller_addon.mixins.json"

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="${forge_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

# Load after the base mod so CaveDwellerEntity and registries exist
[[dependencies.${mod_id}]]
modId="cave_dweller"
mandatory=true
versionRange="[1.6.4,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="geckolib"
mandatory=true
versionRange="[4.2,)"
ordering="AFTER"
side="BOTH"
